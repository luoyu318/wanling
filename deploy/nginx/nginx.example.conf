# Wanling 反向代理模板（纯 HTTP）
#
# 用法：
#   1. sudo cp deploy/nginx/nginx.example.conf /etc/nginx/sites-available/wanling
#   2. 编辑 server_name 改为实际域名/IP
#   3. sudo ln -s /etc/nginx/sites-available/wanling /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#
# 前提：wanling server 已通过 docker compose up 在 0.0.0.0:18008 监听
# 场景：内网部署 / Cloudflare 前置 TLS / 自签证书环境

server {
    listen 80;
    server_name chat.example.com;   # ← 改这里

    # 头像、聊天附件上传（CLAUDE.md 建议 20MB）
    client_max_body_size 20M;

    # WebSocket 升级映射
    location /ws {
        proxy_pass http://127.0.0.1:18008;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WS 长连接超时（默认 60s 太短，会断消息推送）
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # HTTP API + 文件下载
    location / {
        proxy_pass http://127.0.0.1:18008;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
