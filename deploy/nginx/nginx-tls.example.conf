# Wanling 反向代理模板（含 TLS）
#
# 用法：
#   1. 申请证书：
#        sudo certbot certonly --standalone -d chat.example.com
#      或用现有证书，替换下方 /etc/letsencrypt/live/chat.example.com/ 路径
#   2. sudo cp deploy/nginx/nginx-tls.example.conf /etc/nginx/sites-available/wanling
#   3. 编辑 server_name 和证书路径
#   4. sudo ln -s /etc/nginx/sites-available/wanling /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# 证书自动续期（在宿主机 cron，不在 compose 里）：
#   0 0 * * 0 certbot renew --deploy-hook "systemctl reload nginx"

server {
    listen 80;
    server_name chat.example.com;
    # 强制 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chat.example.com;

    ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    location /ws {
        proxy_pass http://127.0.0.1:18008;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:18008;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
