name: wanling-platform
label: Wanling
kind: platform
version: 0.2.0
description: >
  Wanling platform adapter for Hermes Agent.
  Connects to a Wanling server (Go/Gin IM server with standard IM Bot-style
  WebSocket protocol) and relays messages between Wanling users and
  the Hermes agent.
  Requires a pre-registered agent (agent_id + secret_key) on the server.
author: Local
requires_env:
  - name: WANLING_AGENT_ID
    description: "Agent ID on the Wanling server (UUID)"
    prompt: "Agent ID"
    password: false
  - name: WANLING_SECRET_KEY
    description: "Agent secret key (used to exchange JWT token)"
    prompt: "Secret key"
    password: true
optional_env:
  - name: WANLING_SERVER_URL
    description: "Wanling server base URL (default: http://localhost:18008)"
    prompt: "Server URL"
    password: false
  - name: WANLING_HOME_USER
    description: "User ID for cron / notification delivery (one-on-one)"
    prompt: "Home user ID"
    password: false
  - name: WANLING_ALLOWED_USERS
    description: "Comma-separated user IDs allowed to talk to the agent"
    prompt: "Allowed user IDs (comma-separated)"
    password: false
  - name: WANLING_ALLOW_ALL_USERS
    description: "Allow any user to talk to the agent (dev only)"
    prompt: "Allow all users? (true/false)"
    password: false
