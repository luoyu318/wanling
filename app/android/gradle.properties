# JVM 内存上限校准至 16GB 开发机:原 -Xmx8G/MaxMetaspaceSize=4G 会与模型服务、
# IDE、ZCode 等常驻进程争抢内存,导致 OOM 死机。3G 堆 + 1G 元空间足够覆盖
# Flutter Android 构建峰值(实测 ~2.5G),并留出安全余量。
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=384m -XX:+HeapDumpOnOutOfMemoryError
# 关闭 daemon:构建结束 JVM 立即退出,杜绝残留进程常驻吃内存(曾导致多次死机)。
# 代价:每次构建多 ~5-10s 冷启动,对开发节奏无实质影响。
org.gradle.daemon=false
android.useAndroidX=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
